    /* ===== General Styles ===== */
    .header { padding: 12px 16px; font-weight: bold; font-size: 13px; border-bottom: 1px solid var(--vscode-panel-border); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 10; background: var(--vscode-sideBar-background); }
    .header-actions { cursor: pointer; font-size: 11px; color: var(--vscode-descriptionForeground); display: flex; gap: 8px; align-items: center; }
    .theme-select { background: var(--vscode-dropdown-background); color: var(--vscode-dropdown-foreground); border: 1px solid var(--vscode-dropdown-border); padding: 2px 6px; border-radius: 4px; font-size: 11px; cursor: pointer; }
    .theme-label { font-size: 10px; color: var(--vscode-descriptionForeground); margin-right: 4px; }

    .branch-section { padding: 8px 12px; border-bottom: 1px solid var(--vscode-panel-border); background: var(--vscode-sideBar-background); }
    .branch-inputs { display: flex; gap: 4px; margin-bottom: 6px; align-items: center; }
    .branch-input-wrapper { position: relative; flex: 1; min-width: 0; }
    .branch-inputs input { width: 100%; box-sizing: border-box; background: var(--vscode-input-background); color: var(--vscode-input-foreground); border: 1px solid var(--vscode-input-border); padding: 4px 8px; border-radius: 4px; font-size: 12px; }
    .branch-inputs input:focus { outline: 1px solid var(--vscode-focusBorder, #007fd4); outline-offset: -1px; }
    .branch-suggestions { display: none; position: absolute; top: calc(100% + 3px); left: 0; right: 0; z-index: 30; max-height: 156px; overflow-y: auto; border: 1px solid var(--vscode-quickInputList-focusBackground, var(--vscode-dropdown-border)); border-radius: 5px; background: var(--vscode-quickInput-background, var(--vscode-dropdown-background)); box-shadow: 0 6px 18px rgba(0,0,0,0.28); padding: 3px; }
    .branch-suggestions.visible { display: block; }

    let notificationRequests = [];
    let notificationInputs = {};
    let notificationSelections = {};
    let branchSuggestionState = {
      activeKind: null,
      source: [],
      target: [],
      activeIndex: 0,
      requestSeq: 0,
    };
    // Per-tab scroll positions (key: tab name)
    let scrollPositions = { files: 0, comments: 0, remote: 0, trash: 0 };

    function saveScrollPosition() {
      const el = document.querySelector('.comments-scroll-area');
      if (el) scrollPositions[activeTab] = el.scrollTop;
    }

    function restoreScrollPosition() {
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          const el = document.querySelector('.comments-scroll-area');
          if (el) el.scrollTop = scrollPositions[activeTab] || 0;
        });
      });
    }

    function toggleFilter(type) {
      if (activeFilters.has(type)) activeFilters.delete(type);
      else activeFilters.add(type);
      render();
    }

    function setRemoteFilter(filter) {
      if (remoteFilter.has(filter)) remoteFilter.delete(filter);
      else remoteFilter.add(filter);
      render();
    }

    function refreshRemoteComments() {
      vscode.postMessage({ type: 'refreshRemoteComments' });
    }

    function renderNotifications() {
      const root = document.getElementById('notification-root');
      if (!root) return;
      document.body.classList.toggle('has-notifications', notificationRequests.length > 0);
      const modal = notificationRequests.find(n => n.kind === 'input' || n.kind === 'quickPick');
      const toasts = notificationRequests.filter(n => n.kind === 'toast');
      const stack = toasts.length ? `<div class="notification-stack">${toasts.map(renderNotificationCard).join('')}</div>` : '';
      const modalHtml = modal ? `<div class="notification-modal-backdrop">${renderNotificationCard(modal)}</div>` : '';
      root.innerHTML = modalHtml + stack;
      if (modal?.kind === 'input') {
        const input = document.getElementById(`notification-input-${modal.id}`);
        if (input) {
          input.focus();
          input.selectionStart = input.selectionEnd = input.value.length;
        }
      }
    }

    function renderNotificationCard(req) {
      const icon = req.severity === 'error' ? '&#10060;' : req.severity === 'warning' ? '&#9888;&#65039;' : '&#8505;&#65039;';
      const actions = renderNotificationActions(req);
      const body = req.kind === 'input'
        ? `<input id="notification-input-${escapeAttr(req.id)}" class="notification-input" value="${escapeAttr(notificationInputs[req.id] ?? req.value ?? '')}" placeholder="${escapeAttr(req.placeholder || '')}" oninput="notificationInputs['${escapeJs(req.id)}']=this.value" onkeydown="handleNotificationInputKey(event, '${escapeJs(req.id)}')">`
        : req.kind === 'quickPick'
          ? renderNotificationPicker(req)
          : '';
      return `<div class="notification-card ${escapeAttr(req.severity || 'info')}" data-notification-id="${escapeAttr(req.id)}">
        <div class="notification-header">
          <div class="notification-icon">${icon}</div>
          <div class="notification-message">${escapeHtml(req.message || '')}</div>
          <button class="notification-close" title="关闭" onclick="completeNotification('${escapeJs(req.id)}', undefined, true)">&times;</button>
        </div>
        ${body}
        ${actions}
      </div>`;
    }

    function renderNotificationActions(req) {
      if (req.kind === 'input') {
        return `<div class="notification-actions">
          <button class="notification-action" onclick="completeNotification('${escapeJs(req.id)}', undefined, true)">取消</button>
          <button class="notification-action primary" onclick="submitNotificationInput('${escapeJs(req.id)}')">确定</button>
        </div>`;
      }
      if (req.kind === 'quickPick') {
        return `<div class="notification-actions">
          <button class="notification-action" onclick="completeNotification('${escapeJs(req.id)}', undefined, true)">取消</button>
          ${req.canPickMany ? `<button class="notification-action primary" onclick="submitNotificationQuickPick('${escapeJs(req.id)}')">确定</button>` : ''}
        </div>`;
      }
      if (!req.items || req.items.length === 0) return '';
      return `<div class="notification-actions">
        ${req.items.map((item, index) => `<button class="notification-action ${index === 0 ? 'primary' : ''}" onclick="completeNotification('${escapeJs(req.id)}', ${index}, false)">${escapeHtml(item.label || item.value || '')}</button>`).join('')}
      </div>`;
    }

    function renderNotificationPicker(req) {
      const selected = notificationSelections[req.id] || new Set((req.items || []).map((item, index) => item.picked ? index : -1).filter(index => index >= 0));
      notificationSelections[req.id] = selected;
      return `<div class="notification-picker">
        ${(req.items || []).map((item, index) => {
          const isSelected = selected.has(index);
          return `<div class="notification-picker-item ${isSelected ? 'selected' : ''}" data-notification-pick-id="${escapeAttr(req.id)}" data-notification-pick-index="${index}" onclick="toggleNotificationPick('${escapeJs(req.id)}', ${index})">
            <span class="notification-picker-mark">${req.canPickMany ? (isSelected ? '&#9745;' : '&#9744;') : (isSelected ? '&#9679;' : '&#9675;')}</span>
            <span class="notification-picker-main">
              <div class="notification-picker-label">${escapeHtml(item.label || '')}</div>
              ${item.description || item.detail ? `<div class="notification-picker-desc">${escapeHtml(item.description || item.detail || '')}</div>` : ''}
            </span>
          </div>`;
        }).join('')}
      </div>`;
    }

    function findNotification(id) {
      return notificationRequests.find(n => n.id === id);
    }

    function removeNotification(id) {
      notificationRequests = notificationRequests.filter(n => n.id !== id);
      delete notificationInputs[id];
      delete notificationSelections[id];
      renderNotifications();
    }

    function completeNotification(id, itemIndex, dismissed) {
      const req = findNotification(id);
      const item = typeof itemIndex === 'number' ? req?.items?.[itemIndex] : undefined;
      vscode.postMessage({ type: 'notificationResponse', id, dismissed: !!dismissed, value: item });
      removeNotification(id);
    }

    function submitNotificationInput(id) {
      const value = notificationInputs[id] ?? document.getElementById(`notification-input-${id}`)?.value ?? '';
      vscode.postMessage({ type: 'notificationResponse', id, dismissed: false, value });
      removeNotification(id);
    }

    function handleNotificationInputKey(event, id) {
      if (event.key === 'Enter') {
        event.preventDefault();
        submitNotificationInput(id);
      } else if (event.key === 'Escape') {
        event.preventDefault();
        completeNotification(id, undefined, true);
      }
    }

    function toggleNotificationPick(id, index) {
      const req = findNotification(id);
      if (!req) return;
      const selected = notificationSelections[id] || new Set();
      if (req.canPickMany) {
        if (selected.has(index)) selected.delete(index);
        else selected.add(index);
        notificationSelections[id] = selected;
        syncNotificationPickerSelection(req);
      } else {
        notificationSelections[id] = new Set([index]);
        submitNotificationQuickPick(id);
      }
    }

    function syncNotificationPickerSelection(req) {
      const selected = notificationSelections[req.id] || new Set();
      document.querySelectorAll(`[data-notification-pick-id="${cssEscape(req.id)}"]`).forEach((el) => {
        const index = Number(el.getAttribute('data-notification-pick-index'));
        const isSelected = selected.has(index);
        el.classList.toggle('selected', isSelected);
        const mark = el.querySelector('.notification-picker-mark');
        if (mark) mark.innerHTML = req.canPickMany ? (isSelected ? '&#9745;' : '&#9744;') : (isSelected ? '&#9679;' : '&#9675;');
      });
    }

    function submitNotificationQuickPick(id) {
      const req = findNotification(id);
      if (!req) return;
      const selected = notificationSelections[id] || new Set();
      const values = Array.from(selected).sort((a, b) => a - b).map(index => req.items[index]).filter(Boolean);
      vscode.postMessage({ type: 'notificationResponse', id, dismissed: req.canPickMany ? false : values.length === 0, value: req.canPickMany ? values : values[0] });
      removeNotification(id);
    }

    function render() {
      const app = document.getElementById('app');
      // Save scroll position on the correct container for the active tab
      saveScrollPosition();

      // Apply theme to body
      document.body.setAttribute('data-theme', state.theme || 'piano-dark');

      const mrSelect = renderMRSelect();
      app.innerHTML = `
        <div class="header">
          <span>代码评审</span>
          <span class="header-actions">
            <span class="theme-label">主题</span>
            <select class="theme-select" id="themeSelect" onchange="changeTheme(this.value)">
              <option value="piano-dark" ${state.theme === 'piano-dark' ? 'selected' : ''}>Piano Dark</option>
              <option value="piano-light" ${state.theme === 'piano-light' ? 'selected' : ''}>Piano Light</option>
              <option value="midnight-blue" ${state.theme === 'midnight-blue' ? 'selected' : ''}>Midnight Blue</option>
              <option value="nocturne-purple" ${state.theme === 'nocturne-purple' ? 'selected' : ''}>Nocturne Purple</option>
              <option value="classic-light" ${state.theme === 'classic-light' ? 'selected' : ''}>Classic Light</option>
            </select>
            <span onclick="installSkill()">&#128230; 安装技能</span>
            <span onclick="vscode.postMessage({type: 'settings'})">&#9881;&#65039; 设置</span>
          </span>
        </div>
        ${state.fetchFailed ? '<div style="padding:8px 12px;background:#f4433622;color:#f44336;font-size:11px;border-bottom:1px solid var(--vscode-panel-border);">&#9888;&#65039; 远程同步失败，Diff 可能过期</div>' : ''}
        <div class="branch-section">
          <div class="mr-row">
            <select class="mr-select" id="mrSelect" onchange="selectMR(this.value)">
              ${mrSelect}
            </select>
            <button class="mr-refresh-btn" title="刷新 MR 列表" onclick="loadMRs()">&#8635;</button>
          </div>
          ${state.mrId
            ? `<div class="mr-hint">已关联 MR: #${state.mrId}</div>`
            : `<div class="mr-hint missing">未关联 MR，无法提交评论</div>`}
          <div class="branch-inputs">
            <div class="branch-input-wrapper">
              <input id="sourceBranch" placeholder="源分支" value="${escapeAttr(state.sourceBranch)}" autocomplete="off" onfocus="handleBranchFocus('source')" oninput="handleBranchInput('source')" onkeydown="handleBranchKeydown(event, 'source')" onblur="hideBranchSuggestionsSoon()">
              <div id="sourceBranchSuggestions" class="branch-suggestions"></div>
            </div>
            <span class="branch-arrow">&rarr;</span>
            <div class="branch-input-wrapper">
              <input id="targetBranch" placeholder="目标分支 (输入 {init} 评审全部文件)" value="${escapeAttr(state.targetBranch)}" autocomplete="off" onfocus="handleBranchFocus('target')" oninput="handleBranchInput('target')" onkeydown="handleBranchKeydown(event, 'target')" onblur="hideBranchSuggestionsSoon()">
              <div id="targetBranchSuggestions" class="branch-suggestions"></div>
            </div>
          </div>
          <button class="btn btn-primary" onclick="openDiff()">&#128640; 打开对比</button>
        </div>
        <div class="panel-content">
          ${renderTabs()}
          ${renderTabContent()}
        </div>
      `;
      // Restore scroll position on the correct container for the active tab
      restoreScrollPosition();

      setTimeout(() => {
        // Only scroll to highlight if there are actually new comments
        if (highlightCommentIds.size === 0) return;
        highlightCommentIds.forEach(id => {
          const el = document.getElementById(`comment-${id}`);
          if (el) {
            el.scrollIntoView({ behavior: 'smooth', block: 'center' });
          }
        });
        highlightCommentIds.clear();
      }, 50);
      setTimeout(() => refreshActiveBranchSuggestions(), 0);
    }

    function renderTabs() {
      const nonDeleted = state.comments.length;
      const deletedCount = state.deletedComments.length;
      const remoteCount = (state.remoteComments || []).length;
      return `
        <div class="tabs">
          <div class="tab ${activeTab === 'files' ? 'active' : ''}" onclick="switchTab('files')">
            变更文件 <span class="tab-count">(${state.files.length})</span>
          </div>
          <div class="tab ${activeTab === 'comments' ? 'active' : ''}" onclick="switchTab('comments')">
            当前评论 <span class="tab-count">(${nonDeleted})</span>
          </div>
          <div class="tab ${activeTab === 'remote' ? 'active' : ''}" onclick="switchTab('remote')">
            远端评论 <span class="tab-count">(${remoteCount})</span>
          </div>
          <div class="tab ${activeTab === 'trash' ? 'active' : ''}" onclick="switchTab('trash')">
            回收站 <span class="tab-count">(${deletedCount})</span>
          </div>
        </div>
      `;
    }

    function renderMRSelect() {
      const mrList = state.mrList || [];
      const currentMR = state.mrId;
      let options = '<option value="">▼ 选择 MR...</option>';
      if (mrList.length > 0) {
        for (const mr of mrList) {
          const selected = currentMR && String(mr.id) === String(currentMR) ? 'selected' : '';
          options += `<option value="${escapeAttr(mr.id)}" ${selected}>#${escapeHtml(mr.id)} ${escapeHtml(mr.title || '')} (${escapeHtml(mr.sourceBranch || '')} → ${escapeHtml(mr.targetBranch || '')})</option>`;
        }
      }
      return options;
    }

    function renderTabContent() {
      if (activeTab === 'files') return renderFileList();
      if (activeTab === 'comments') return renderComments();
      if (activeTab === 'remote') return renderRemoteComments();
      if (activeTab === 'trash') return renderTrash();
      return '';
    }

    function switchTab(tab) {
      // Save current tab's scroll position BEFORE switching
      saveScrollPosition();
      activeTab = tab;
      render();
    }

    function changeTheme(theme) {
      vscode.postMessage({ type: 'changeTheme', theme });
      state.theme = theme;
      render();
    }

    function installSkill() {
      vscode.postMessage({ type: 'installSkill' });
    }

    // ===== File Tree =====

    const FILE_TREE_BASE_PADDING = 12;
    const FILE_TREE_INDENT_STEP = 16;

    function getFileTreePadding(depth) {
      return FILE_TREE_BASE_PADDING + depth * FILE_TREE_INDENT_STEP;
    }

    function buildFileTree(files) {
      const root = { __files: [] };
      for (const f of files) {
        if (!f || !f.filePath) continue;
        const parts = f.filePath.split('/');
        let node = root;
        for (let i = 0; i < parts.length - 1; i++) {
          if (!node[parts[i]]) node[parts[i]] = { __files: [] };
          node = node[parts[i]];
        }
        if (!node.__files) node.__files = [];
        node.__files.push(f);
      }
      return root;
    }

    function renderFileTreeNode(tree, prefix, depth) {
      let html = '';
      const dirs = [];
      const directFiles = tree.__files || [];

      for (const key of Object.keys(tree)) {
        if (key === '__files') continue;
        dirs.push({ name: key, children: tree[key] });
      }

      for (const dir of dirs) {
        const isExpanded = expandedGroups.has(prefix + dir.name);
        const arrow = isExpanded ? '▼' : '▶';

        const mergedPath = getCollapsePath(dir.children, dir.name, prefix);
        const displayPath = mergedPath + '/';
        const collapsedNode = getCollapsedNode(dir.children, dir.name);
        const dirFiles = countFiles(collapsedNode);

        html += `<div class="file-tree-group ${isExpanded ? 'expanded' : ''}" data-path="${escapeAttr(prefix + dir.name)}">
          <div class="file-tree-group-header" onclick="toggleGroup(this.dataset.path)" data-path="${escapeAttr(prefix + dir.name)}" style="padding-left: ${getFileTreePadding(depth)}px">
            <span class="arrow">${arrow}</span>
            <span class="group-path">${escapeHtml(displayPath)}</span>
            <span class="group-stats">${dirFiles} 个文件</span>
          </div>
          <div class="file-tree-group-children">
            ${renderFileTreeNode(collapsedNode, prefix + mergedPath + '/', depth + 1)}
          </div>
        </div>`;
      }

      for (const f of directFiles) {
        const ext = f.filePath.split('.').pop() || '';
        const icon = getFileIcon(ext);
        const iconSpan = icon ? `<span class="file-icon">${icon}</span>` : '';
        const isActive = state.activeFilePath === f.filePath ? 'file-tree-item-active' : '';
        html += `<div class="file-tree-root-item ${isActive}" onclick="openFileFromElement(this)" data-file-path="${escapeAttr(f.filePath)}" style="padding-left: ${getFileTreePadding(depth)}px">
          <span class="file-tree-file-spacer"></span>
          <span class="file-tree-file-name">${iconSpan}${escapeHtml(f.filePath.split('/').pop())}</span>
          <span class="file-tree-file-stats"><span class="additions">+${f.additions}</span> <span class="deletions">-${f.deletions}</span></span>
        </div>`;
      }

      return html;
    }

    function getCollapsedNode(node, dirName) {
      let current = node;
      while (shouldCollapse(current)) {
        const keys = Object.keys(current).filter(k => k !== '__files');
        current = current[keys[0]];
      }
      return current;
    }

    function getFileIcon(ext) {
      const iconMap = {
        ts: { label: 'TS', color: '#3178c6' }, tsx: { label: 'TSX', color: '#3178c6' },
        js: { label: 'JS', color: '#f7df1e' }, jsx: { label: 'JSX', color: '#f7df1e' },
        json: { label: '{}', color: '#f7df1e' },
        css: { label: '#', color: '#563d7c' },
        html: { label: '<>', color: '#e34f26' },
        md: { label: 'MD', color: '#083fa1' },
        yaml: { label: 'Y', color: '#cb171e' }, yml: { label: 'Y', color: '#cb171e' },
        vue: { label: 'V', color: '#41b883' },
        py: { label: 'PY', color: '#3572a5' },
        go: { label: 'GO', color: '#00add8' },
        java: { label: 'J', color: '#b07219' },
      };
      const info = iconMap[ext.toLowerCase()];
      return info ? `<span style="color:${info.color}">${info.label}</span>` : '';
    }

    function countFiles(node) {
      let count = (node.__files || []).length;
      for (const key of Object.keys(node)) {
        if (key === '__files') continue;
        count += countFiles(node[key]);
      }
      return count;
    }

    function collectAllGroups() {
      function walk(node, prefix) {
        for (const key of Object.keys(node)) {
          if (key === '__files') continue;
          const path = prefix + key;
          expandedGroups.add(path);
          walk(node[key], path + '/');
        }
      }
      walk(buildFileTree(state.files || []), '');
    }

    function shouldCollapse(node) {
      const keys = Object.keys(node).filter(k => k !== '__files');
      return (node.__files || []).length === 0 && keys.length === 1;
    }

    function getCollapsePath(node, dirName, basePrefix) {
      let result = dirName;
      let current = node;
      while (shouldCollapse(current)) {
        const childName = Object.keys(current).filter(k => k !== '__files')[0];
        result += '/' + childName;
        current = current[childName];
      }
      return result;
    }

    function toggleGroup(path) {
      if (expandedGroups.has(path)) {
        expandedGroups.delete(path);
      } else {
        expandedGroups.add(path);
      }
      render();
    }

    function renderFileList() {
      if (!state.files.length) return '<div style="padding:12px;color:var(--vscode-descriptionForeground);font-size:12px;text-align:center;">暂无变更文件</div>';
      const totalAdd = state.files.reduce((s, f) => s + f.additions, 0);
      const totalDel = state.files.reduce((s, f) => s + f.deletions, 0);
      const tree = buildFileTree(state.files);
      return `
        <div class="comments-tab-wrapper">
          <div class="file-list-title">
            <span class="file-list-title-main">变更文件 (${state.files.length}) &middot; <span class="additions">+${totalAdd}</span> <span class="deletions">-${totalDel}</span></span>
            <button class="file-list-clear-btn" onclick="clearReview()" title="清空当前对比的变更文件和所有评论">清空对比</button>
          </div>
          <div class="comments-scroll-area">
            ${renderFileTreeNode(tree, '', 0)}
          </div>
        </div>
      `;
    }

    // ===== Comments =====

    function renderComments() {
      const comments = state.comments;
      if (!comments.length) {
        return `
          <div class="comments-tab-wrapper">
            <div class="comments-scroll-area" style="display:flex;align-items:center;justify-content:center;">
              <div style="padding:12px;color:var(--vscode-descriptionForeground);font-size:12px;text-align:center;">暂无评论</div>
            </div>
          </div>
        `;
      }

      const userConfirmedCount = comments.filter(c => c.author === 'user' && c.status === 'confirmed').length;
      const pendingCount = comments.filter(c => c.author === 'agent' && c.status === 'pending').length;
      const confirmedCount = comments.filter(c => c.author === 'agent' && c.status === 'confirmed').length;
      const submittedCount = comments.filter(c => c.status === 'submitted').length;

      const filtered = comments.filter(c => {
        if (c.author === 'user' && c.status === 'confirmed') return activeFilters.has('user');
        if (c.author === 'agent' && c.status === 'pending') return activeFilters.has('pending');
        if (c.author === 'agent' && c.status === 'confirmed') return activeFilters.has('confirmed');
        if (c.status === 'submitted') return activeFilters.has('submitted');
        return false;
      }).sort(commentSortFn);

      const submittable = comments.filter(c =>
        (c.author === 'user' && c.status !== 'submitted') ||
        (c.author === 'agent' && c.status === 'confirmed')
      ).length;
      const hasSubmittable = submittable > 0 || submittedCount > 0;

      return `
        <div class="comments-tab-wrapper">
          <div class="comment-filter-bar">
            <span class="filter-toggle ${activeFilters.has('user') ? 'active' : ''}" onclick="toggleFilter('user')">&#128100; 用户已确认 <span class="filter-count">(${userConfirmedCount})</span></span>
            <span class="filter-toggle ${activeFilters.has('pending') ? 'active' : ''}" onclick="toggleFilter('pending')">&#129302; AI待确认 <span class="filter-count">(${pendingCount})</span></span>
            <span class="filter-toggle ${activeFilters.has('confirmed') ? 'active' : ''}" onclick="toggleFilter('confirmed')">&#129302; AI已确认 <span class="filter-count">(${confirmedCount})</span></span>
            <span class="filter-toggle ${activeFilters.has('submitted') ? 'active' : ''}" onclick="toggleFilter('submitted')">&#10003; 已提交 <span class="filter-count">(${submittedCount})</span></span>
          </div>
          <div class="comments-scroll-area">
            ${filtered.map(c => renderCommentCard(c)).join('')}
            ${filtered.length === 0 ? '<div style="padding:12px;color:var(--vscode-descriptionForeground);font-size:12px;text-align:center;">无匹配的评论</div>' : ''}
          </div>
          ${pendingCount > 0 || submittable > 0 || submittedCount > 0 ? `
          <div class="comments-action-bar">
            <button class="btn btn-confirm-all" onclick="vscode.postMessage({type: 'confirmAllAgent'})" ${pendingCount === 0 ? 'disabled' : ''}>&#129302; 全部确认 (${pendingCount})</button>
            <button class="btn btn-primary" onclick="vscode.postMessage({type: 'submitAll'})" ${submittable === 0 ? 'disabled' : ''}>&#128228; 提交全部 (${submittable})</button>
          </div>
          ${submittable > 0 || submittedCount > 0 ? `<div class="action-bar-count">${submittable} 待提交 &middot; ${submittedCount} 已提交</div>` : ''}
          ` : ''}
        </div>
      `;
    }

    function renderTrash() {
      if (!state.deletedComments.length) return '<div style="padding:12px;color:var(--vscode-descriptionForeground);font-size:12px;text-align:center;">回收站为空</div>';
      const sorted = [...state.deletedComments].sort(commentSortFn);
      return `
        <div class="comments-tab-wrapper">
          <div class="comments-header">回收站 (${state.deletedComments.length})</div>
          <div class="comments-scroll-area">
            ${sorted.map(c => renderTrashCard(c)).join('')}
          </div>
        </div>
      `;
    }

    /** Sort comments by file path (alphabetically) then by line number. */
    function commentSortFn(a, b) {
      const fa = a.filePath || '';
      const fb = b.filePath || '';
      if (fa !== fb) return fa.localeCompare(fb);
      return (a.lineNumber || 0) - (b.lineNumber || 0);
    }

    function renderRemoteComments() {
      const allComments = state.remoteComments || [];
      const refreshBar = state.mrId ? `
          <div class="comment-filter-bar">
            <span class="filter-toggle refresh-btn" onclick="refreshRemoteComments()" title="刷新远端评论">&#x21bb; 刷新</span>
          </div>` : '';
      if (!allComments.length) {
        return `
          <div class="comments-tab-wrapper">
            ${refreshBar}
            <div class="comments-scroll-area" style="display:flex;align-items:center;justify-content:center;">
              <div style="padding:12px;color:var(--vscode-descriptionForeground);font-size:12px;text-align:center;">暂无远端评论${state.mrId ? '' : '，请先关联 MR'}</div>
            </div>
          </div>
        `;
      }

      const getResolution = c => c.resolution || (c.resolved === true ? 'resolved' : (c.resolved === false ? 'unresolved' : 'unknown'));
      const unresolvedCount = allComments.filter(c => getResolution(c) === 'unresolved').length;
      const resolvedCount = allComments.filter(c => getResolution(c) === 'resolved').length;
      const unknownCount = allComments.filter(c => getResolution(c) === 'unknown').length;

      const filtered = allComments.filter(c => {
        return remoteFilter.has(getResolution(c));
      }).sort(commentSortFn);

      return `
        <div class="comments-tab-wrapper">
          <div class="comment-filter-bar">
            <span class="filter-toggle ${remoteFilter.has('resolved') ? 'active' : ''}" onclick="setRemoteFilter('resolved')">已解决 <span class="filter-count">(${resolvedCount})</span></span>
            <span class="filter-toggle ${remoteFilter.has('unresolved') ? 'active' : ''}" onclick="setRemoteFilter('unresolved')">未解决 <span class="filter-count">(${unresolvedCount})</span></span>
            <span class="filter-toggle ${remoteFilter.has('unknown') ? 'active' : ''}" onclick="setRemoteFilter('unknown')">状态未知 <span class="filter-count">(${unknownCount})</span></span>
            <span class="filter-toggle refresh-btn" onclick="refreshRemoteComments()" title="刷新远端评论">&#x21bb; 刷新</span>
          </div>
          <div class="comments-scroll-area">
            ${filtered.map(c => renderRemoteCommentCard(c)).join('')}
            ${filtered.length === 0 ? '<div style="padding:12px;color:var(--vscode-descriptionForeground);font-size:12px;text-align:center;">无匹配的评论</div>' : ''}
          </div>
        </div>
      `;
    }

    function renderRemoteCommentCard(c) {
      const location = c.filePath ? `${c.filePath}:${c.lineNumber}` : '全局评论';
      const date = c.createdAt ? new Date(c.createdAt).toLocaleDateString('zh-CN') : '';
      const resolution = c.resolution || (c.resolved === true ? 'resolved' : (c.resolved === false ? 'unresolved' : 'unknown'));
      const resolvedBadge = resolution === 'resolved' ? '<span class="remote-badge resolved">&#10003; 已解决</span>' :
        resolution === 'unknown' ? '<span class="remote-badge resolved">状态未知</span>' : '';
      const canResolve = resolution === 'unresolved' && c.canResolve && state.remoteCapabilities && state.remoteCapabilities.canResolveRemoteComments;
      const actions = canResolve
        ? `<div class="comment-actions"><button class="comment-action action-confirm" onclick="event.stopPropagation(); vscode.postMessage({type: 'resolveRemoteComment', id: '${escapeAttr(c.id)}'})">Resolve</button></div>`
        : '';
      const clickHandler = c.filePath
        ? `onclick="openFileAtLine(event, this)" data-file-path="${escapeAttr(c.filePath)}" data-line-number="${escapeAttr(normalizeLineNumber(c.lineNumber))}"`
        : '';
      return `<div class="comment-card remote ${resolution === 'resolved' ? 'resolved' : ''}" ${clickHandler}>
        ${resolvedBadge}
        <div class="remote-header">
          <span class="remote-badge">远端</span>
          <span class="remote-author">${escapeHtml(c.author)}</span>
          <span class="remote-date">${date}</span>
        </div>
        <div class="remote-file-path">${escapeHtml(location)}</div>
        <div class="comment-content">${renderMarkdown(c.content)}</div>
        ${actions}
      </div>`;
    }

    function renderCommentCard(c) {
      const isAgent = c.author === 'agent';
      const authorLabel = isAgent ? `<span class="agent-label">&#129302; AI</span>` : `<span class="user-label">&#128100; 我</span>`;
      const badge = c.status === 'submitted' ? `<span class="comment-badge badge-submitted">&#10003; 已提交</span>` :
                    c.status === 'confirmed' ? `<span class="comment-badge badge-confirmed">已确认</span>` :
                    c.status === 'pending' && isAgent ? `<span class="comment-badge badge-pending">待确认</span>` : '';

      const isHighlighted = highlightCommentIds.has(c.id) ? 'highlight' : '';
      const isEditing = editingCommentId === c.id;

      if (isEditing) {
        return `<div id="comment-${escapeAttr(c.id)}" class="comment-card ${isAgent ? 'agent' : 'user'} ${escapeAttr(c.status)}">
          ${badge}
          <div class="comment-author">${authorLabel}</div>
          <div class="comment-location">${escapeHtml(c.filePath)}:${escapeHtml(normalizeLineNumber(c.lineNumber))}</div>
          <div class="comment-editor">
            <textarea id="editor-${c.id}" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();saveEdit('${escapeAttr(c.id)}')}">${escapeHtml(editingContent)}</textarea>
            <div class="comment-editor-actions">
              <button class="comment-action action-confirm" onclick="event.stopPropagation(); saveEdit('${escapeAttr(c.id)}')">&#10003; 保存</button>
              <button class="comment-action action-secondary" onclick="event.stopPropagation(); cancelEdit()">&#10007; 取消</button>
            </div>
          </div>
        </div>`;
      }

      let actions = '';
      if (c.status === 'pending' && isAgent) {
        actions = `<button class="comment-action action-confirm" onclick="event.stopPropagation(); vscode.postMessage({type: 'confirmComment', id: '${escapeAttr(c.id)}'})">&#10003; 保留</button>
                   <button class="comment-action action-secondary" onclick="event.stopPropagation(); vscode.postMessage({type: 'deleteComment', id: '${escapeAttr(c.id)}'})">&#10007; 删除</button>
                   <button class="comment-action action-secondary" onclick="event.stopPropagation(); vscode.postMessage({type: 'startEdit', id: '${escapeAttr(c.id)}'})">&#9998; 编辑</button>`;
      } else if (c.status === 'confirmed') {
        actions = `<button class="comment-action action-secondary" onclick="event.stopPropagation(); vscode.postMessage({type: 'deleteComment', id: '${escapeAttr(c.id)}'})">&#10007; 删除</button>
                   <button class="comment-action action-secondary" onclick="event.stopPropagation(); startEdit('${escapeAttr(c.id)}')">&#9998; 编辑</button>`;
      }

      return `<div id="comment-${escapeAttr(c.id)}" class="comment-card ${isAgent ? 'agent' : 'user'} ${escapeAttr(c.status)} ${isHighlighted}" onclick="openFileAtLine(event, this)" data-file-path="${escapeAttr(c.filePath)}" data-line-number="${escapeAttr(normalizeLineNumber(c.lineNumber))}">
        ${badge}
        <div class="comment-author">${authorLabel}</div>
        <div class="comment-location">${escapeHtml(c.filePath)}:${escapeHtml(normalizeLineNumber(c.lineNumber))}</div>
        <div class="comment-content">${renderMarkdown(c.content)}</div>
        <div class="comment-actions">${actions}</div>
      </div>`;
    }

    function escapeRegex(str) {
      return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    }

    function startEdit(id) {
      vscode.postMessage({type: 'startEdit', id});
    }

    function cancelEdit() {
      editingCommentId = null;
      editingContent = '';
      render();
    }

    function saveEdit(id) {
      const ta = document.getElementById('editor-' + id);
      if (!ta) return;
      let content = ta.value.trim();
      if (!content) return;
      editingCommentId = null;
      editingContent = '';
      vscode.postMessage({type: 'editComment', id: id, currentContent: content});
    }

    function renderTrashCard(c) {
      const isAgent = c.author === 'agent';
      const authorLabel = isAgent ? `<span class="agent-label">&#129302; AI</span>` : `<span class="user-label">&#128100; 我</span>`;
      return `<div class="comment-card deleted" onclick="openFileAtLine(event, this)" data-file-path="${escapeAttr(c.filePath)}" data-line-number="${escapeAttr(normalizeLineNumber(c.lineNumber))}">
        <span class="comment-badge badge-deleted">已删除</span>
        <div class="comment-author">${authorLabel}</div>
        <div class="comment-location">${escapeHtml(c.filePath)}:${escapeHtml(normalizeLineNumber(c.lineNumber))}</div>
        <div class="comment-content">${escapeHtml(c.content)}</div>
        <div class="comment-actions">
          <button class="comment-action action-undo" onclick="event.stopPropagation(); vscode.postMessage({type: 'undoDeleteComment', id: '${escapeAttr(c.id)}'})">&#8617; 恢复</button>
        </div>
      </div>`;
    }

    // ===== Simple Markdown Renderer =====

    function renderMarkdown(text) {
      if (!text) return '';
      const codeBlocks = [];
      text = text.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => {
        codeBlocks.push(escapeHtml(code));
        return `%%CODEBLOCK${codeBlocks.length - 1}%%`;
      });
      const inlineCodes = [];
      text = text.replace(/`([^`]+)`/g, (_, code) => {
        inlineCodes.push(escapeHtml(code));
        return `%%INLINECODE${inlineCodes.length - 1}%%`;
      });
      let html = escapeHtml(text);
      html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
      html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, (_, label, url) => {
        const safeHref = sanitizeHref(url);
        return safeHref
          ? `<a href="${escapeAttr(safeHref)}" onclick="event.preventDefault()">${label}</a>`
          : label;
      });
      html = html.replace(/^(-\s.+)$/gm, '%%LI%%$1%%/LI%%');
      html = html.replace(/(%%LI%%[^%]+%%\/LI%%(?:<br>%%LI%%[^%]+%%\/LI%%)*)/g, (match) => {
        const items = match.replace(/%%LI%%-\s/g, '<li>').replace(/%%\/LI%%/g, '</li>').replace(/<br>/g, '');
        return '<ul>' + items + '</ul>';
      });
      for (let i = 0; i < codeBlocks.length; i++) {
        html = html.replace(`%%CODEBLOCK${i}%%`, '<pre><code>' + codeBlocks[i] + '</code></pre>');
      }
      for (let i = 0; i < inlineCodes.length; i++) {
        html = html.replace(`%%INLINECODE${i}%%`, '<code>' + inlineCodes[i] + '</code>');
      }
      html = html.replace(/\n/g, '<br>');
      html = html.replace(/<br>(<\/?[uo]l>)/g, '$1');
      html = html.replace(/(<\/?[uo]l>)<br>/g, '$1');
      html = html.replace(/<br>(<\/?pre>)/g, '$1');
      html = html.replace(/(<\/?pre>)<br>/g, '$1');
      return html;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function escapeAttr(text) {
      return String(text).replace(/&/g, '&amp;').replace(/'/g, '&#39;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function escapeJs(text) {
      return String(text).replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/\n/g, '\\n').replace(/\r/g, '\\r');
    }

    function cssEscape(text) {
      return typeof CSS !== 'undefined' && CSS.escape ? CSS.escape(String(text)) : String(text).replace(/"/g, '\\"');
    }

    function sanitizeHref(url) {
      const value = String(url || '').trim();
      try {
        const parsed = new URL(value);
        return parsed.protocol === 'http:' || parsed.protocol === 'https:' ? parsed.href : '';
      } catch {
        return '';
      }
    }

    function normalizeLineNumber(lineNumber) {
      const line = Number(lineNumber);
      return Number.isFinite(line) && line > 0 ? line : 1;
    }

    function handleBranchFocus(kind) {
      branchSuggestionState.activeKind = kind;
      branchSuggestionState.activeIndex = 0;
      if (kind === 'source') {
        // Source branch is intentionally fetched on every focus and not cached.
        vscode.postMessage({ type: 'getBranchSuggestions', kind, requestId: ++branchSuggestionState.requestSeq });
      } else {
        vscode.postMessage({ type: 'getBranchSuggestions', kind, requestId: ++branchSuggestionState.requestSeq });
      }
      refreshActiveBranchSuggestions();
    }

    function handleBranchInput(kind) {
      clearMR();
      const input = getBranchInput(kind);
      if (kind === 'source') state.sourceBranch = input?.value || '';
      else state.targetBranch = input?.value || '';
      branchSuggestionState.activeKind = kind;
      branchSuggestionState.activeIndex = 0;
      refreshActiveBranchSuggestions();
    }

    function handleBranchKeydown(event, kind) {
      const visible = getVisibleBranchSuggestions(kind);
      if (event.key === 'Tab' && kind === 'source') {
        event.preventDefault();
        hideBranchSuggestions();
        document.getElementById('targetBranch')?.focus();
        return;
      }
      if (event.key === 'ArrowDown' && visible.length > 0) {
        event.preventDefault();
        branchSuggestionState.activeIndex = (branchSuggestionState.activeIndex + 1) % visible.length;
        refreshActiveBranchSuggestions();
        return;
      }
      if (event.key === 'ArrowUp' && visible.length > 0) {
        event.preventDefault();
        branchSuggestionState.activeIndex = (branchSuggestionState.activeIndex - 1 + visible.length) % visible.length;
        refreshActiveBranchSuggestions();
        return;
      }
      if (isBranchSuggestionAcceptKey(event.key) && visible.length > 0) {
        event.preventDefault();
        applyBranchSuggestion(kind, visible[branchSuggestionState.activeIndex] || visible[0]);
        return;
      }
      if (event.key === 'Escape') {
        hideBranchSuggestions();
      }
    }

    function getBranchInput(kind) {
      return document.getElementById(kind === 'source' ? 'sourceBranch' : 'targetBranch');
    }

    function isBranchSuggestionAcceptKey(key) {
      return key === 'Enter' || key === ' ' || key === 'Spacebar';
    }

    function getBranchSuggestionsEl(kind) {
      return document.getElementById(kind === 'source' ? 'sourceBranchSuggestions' : 'targetBranchSuggestions');
    }

    function getVisibleBranchSuggestions(kind) {
      const input = getBranchInput(kind);
      const suggestions = branchSuggestionState[kind] || [];
      const query = (input?.value || '').trim().toLowerCase();
      if (!query) return suggestions.slice(0, BRANCH_SUGGESTION_LIMIT);
      return suggestions.filter(branch => {
        if (kind === 'target' && branch === '{init}') return true;
        return branch.toLowerCase().includes(query);
      }).slice(0, BRANCH_SUGGESTION_LIMIT);
    }

    function refreshActiveBranchSuggestions() {
      for (const kind of ['source', 'target']) {
        const popup = getBranchSuggestionsEl(kind);
        if (!popup) continue;
        const visible = branchSuggestionState.activeKind === kind ? getVisibleBranchSuggestions(kind) : [];
        popup.classList.toggle('visible', visible.length > 0);
        const items = visible.map((branch, index) => {
          const item = document.createElement('div');
          item.className = 'branch-suggestion-item' + (index === branchSuggestionState.activeIndex ? ' active' : '');
          item.textContent = branch;
          if (branch === '{init}') {
            const label = document.createElement('span');
            label.className = 'branch-suggestion-kind';
            label.textContent = '全量';
            item.appendChild(label);
          }
          item.addEventListener('mousedown', (event) => {
            event.preventDefault();
            applyBranchSuggestion(kind, branch);
          });
          return item;
        });
        popup.replaceChildren(...items);
      }
    }

    function applyBranchSuggestion(kind, branch) {
      const input = getBranchInput(kind);
      if (!input || !branch) return;
      input.value = branch;
      if (kind === 'source') state.sourceBranch = branch;
      else state.targetBranch = branch;
      clearMR();
      hideBranchSuggestions();
      input.focus();
    }

    function hideBranchSuggestions() {
      branchSuggestionState.activeKind = null;
      document.querySelectorAll('.branch-suggestions').forEach(el => el.classList.remove('visible'));
    }

    function hideBranchSuggestionsSoon() {
      setTimeout(() => {
        const active = document.activeElement;
        if (active?.id !== 'sourceBranch' && active?.id !== 'targetBranch') hideBranchSuggestions();
      }, 120);
    }

    function openFileAtLine(event, el) {
      if (event) event.stopPropagation();
      const filePath = el?.dataset?.filePath;
      if (!filePath) return;
      vscode.postMessage({
        type: 'openFileAtLine',
        filePath,
        lineNumber: normalizeLineNumber(el.dataset.lineNumber),
      });
    }

    function openFileFromElement(el) {
      const filePath = el?.dataset?.filePath;
      if (!filePath) return;
      vscode.postMessage({ type: 'openFile', filePath });
    }

    function clearMR() {
      state.mrId = '';
      const select = document.getElementById('mrSelect');
      if (select) select.value = '';
    }

    function openDiff() {
      const sourceInput = document.getElementById('sourceBranch').value;
      const targetInput = document.getElementById('targetBranch').value;
      const mrSelect = document.getElementById('mrSelect');
      const selectedMRId = mrSelect?.value || '';

      if (selectedMRId && selectedMRId !== '__input__') {
        const mr = state.mrList.find(m => String(m.id) === selectedMRId);
        if (mr && mr.sourceBranch && mr.targetBranch) {
          const sourceEl = document.getElementById('sourceBranch');
          const targetEl = document.getElementById('targetBranch');
          if (sourceEl) sourceEl.value = mr.sourceBranch;
          if (targetEl) targetEl.value = mr.targetBranch;
          vscode.postMessage({
            type: 'openDiff',
            sourceBranch: mr.sourceBranch,
            targetBranch: mr.targetBranch,
            mrId: selectedMRId,
          });
          return;
        }
        vscode.postMessage({
          type: 'openDiff',
          sourceBranch: sourceInput,
          targetBranch: targetInput,
          mrId: selectedMRId,
        });
        return;
      }

      if (!sourceInput || !targetInput) {
        notificationRequests.push({ type: 'notificationRequest', id: `local-${Date.now()}`, kind: 'toast', severity: 'warning', message: '请填写源分支和目标分支，或选择一个 MR', items: [], timeoutMs: 4200 });
        renderNotifications();
        return;
      }

      vscode.postMessage({
        type: 'openDiff',
        sourceBranch: sourceInput,
        targetBranch: targetInput,
      });
    }

    function clearReview() {
      const sourceInput = document.getElementById('sourceBranch')?.value || state.sourceBranch || '';
      const targetInput = document.getElementById('targetBranch')?.value || state.targetBranch || '';
      state = {
        ...state,
        sourceBranch: sourceInput,
        targetBranch: targetInput,
        files: [],
        comments: [],
        deletedComments: [],
        remoteComments: [],
      };
      highlightCommentIds.clear();
      scrollPositions = { files: 0, comments: 0, remote: 0, trash: 0 };
      vscode.postMessage({
        type: 'clearReview',
        sourceBranch: sourceInput,
        targetBranch: targetInput,
        mrId: state.mrId || '',
      });
      render();
    }

    function loadMRs() {
      vscode.postMessage({ type: 'loadMRs' });
    }

    function selectMR(mrId) {
      if (!mrId) return;
      const mr = state.mrList.find(m => String(m.id) === mrId);
      state.mrId = mrId;
      state.sourceBranch = mr?.sourceBranch || '';
      state.targetBranch = mr?.targetBranch || '';
      render();
    }

    vscode.postMessage({ type: 'restoreState' });

    window.addEventListener('message', (event) => {
      const msg = event.data;
      if (msg.type === 'updateState') {
        const prevComments = state.comments || [];
        const newComments = msg.state.comments || [];
        const prevIds = new Set(prevComments.map(c => c.id));
        for (const c of newComments) {
          if (!prevIds.has(c.id)) {
            highlightCommentIds.add(c.id);
          }
        }

        const prevFiles = state.files || [];
        const newFiles = msg.state.files || [];
        if (prevFiles.length !== newFiles.length || JSON.stringify(prevFiles.map(f => f.filePath)) !== JSON.stringify(newFiles.map(f => f.filePath))) {
          expandedGroups.clear();
        }
        collectAllGroups();

        state = { ...state, ...msg.state };
        agentSignature = msg.state.agentSignature || '';
        userSignature = msg.state.userSignature || '';

        if (highlightCommentIds.size > 0) {
          activeTab = 'comments';
        }

        render();
      } else if (msg.type === 'editContent') {
        editingCommentId = msg.id;
        editingContent = msg.content || '';
        render();
        setTimeout(() => {
          const ta = document.getElementById('editor-' + msg.id);
          if (ta) { ta.focus(); ta.selectionStart = ta.selectionEnd = ta.value.length; }
        }, 50);
      } else if (msg.type === 'updateMRList') {
        state.mrList = msg.mrList || [];
        state.mrId = msg.mrId || '';
        render();
      } else if (msg.type === 'updateBranchSuggestions') {
        const kind = msg.kind === 'target' ? 'target' : 'source';
        branchSuggestionState[kind] = msg.suggestions || [];
        branchSuggestionState.activeIndex = 0;
        refreshActiveBranchSuggestions();
      } else if (msg.type === 'notificationRequest') {
        notificationRequests = notificationRequests.filter(n => n.id !== msg.id);
        notificationRequests.push(msg);
        renderNotifications();
        if (msg.kind === 'toast' && msg.timeoutMs > 0) {
          setTimeout(() => {
            if (findNotification(msg.id)) {
              vscode.postMessage({ type: 'notificationResponse', id: msg.id, dismissed: true });
              removeNotification(msg.id);
            }
          }, msg.timeoutMs);
        }
      }
    });

    render();
    renderNotifications();
  </script>
</body>
</html>
